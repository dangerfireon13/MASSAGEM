<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Angella - Especialista em Tantra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #000000;
        color: #ffffff;
      }
      .neon-red {
        text-shadow: 0 0 15px rgba(220, 38, 38, 0.7);
      }
      .neon-border-red {
        border: 2px solid #dc2626;
        box-shadow: 0 0 25px rgba(220, 38, 38, 0.5);
      }
      .gold-text {
        color: #f59e0b;
        text-shadow: 0 0 8px rgba(245, 158, 11, 0.3);
      }
      
      @keyframes scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      @keyframes scroll-reverse {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .animate-infinite-scroll {
        animation: scroll 20s linear infinite;
      }
      .animate-infinite-scroll-reverse {
        animation: scroll-reverse 20s linear infinite;
      }
      .animate-infinite-scroll:hover, .animate-infinite-scroll-reverse:hover {
        animation-play-state: paused;
      }
      
      .grainy-bg::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        opacity: 0.04;
        pointer-events: none;
        background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        z-index: 100;
      }
      @keyframes pulse-glow {
        0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
        50% { transform: scale(1.03); box-shadow: 0 0 40px rgba(34, 197, 94, 0.7); }
      }
      .animate-pulse-glow {
        animation: pulse-glow 2s ease-in-out infinite;
      }
      
      @keyframes shimmer {
        0% { transform: translateX(-100%) skewX(-12deg); }
        100% { transform: translateX(200%) skewX(-12deg); }
      }
      .shimmer-effect {
        position: relative;
        overflow: hidden;
      }
      .shimmer-effect::after {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 50%; height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
        animation: shimmer 2.5s infinite;
      }
    </style>
</head>
  <body class="grainy-bg">
    <div id="root" class="flex items-center justify-center min-h-screen">
      <div class="text-white font-black animate-pulse">CARREGANDO...</div>
    </div>
    <script type="module" src="/index.tsx"></script>
    <script>
      (function() {
        const easeInOutCubic = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

        document.addEventListener('click', function(e) {
          const anchor = e.target.closest('a[href^="#"]');
          if (!anchor) return;

          const targetId = anchor.getAttribute('href');
          if (targetId === '#' || !targetId.startsWith('#')) return;
          
          try {
            const targetElement = document.querySelector(targetId);
            if (targetElement) {
              e.preventDefault();
              const targetPosition = targetElement.getBoundingClientRect().top + window.pageYOffset;
              const startPosition = window.pageYOffset;
              const distance = targetPosition - startPosition;
              const duration = 1500;
              let start = null;

              window.requestAnimationFrame(function step(timestamp) {
                if (!start) start = timestamp;
                const progress = timestamp - start;
                const percentage = Math.min(progress / duration, 1);
                
                window.scrollTo(0, startPosition + distance * easeInOutCubic(percentage));
                
                if (progress < duration) {
                  window.requestAnimationFrame(step);
                }
              });
            }
          } catch (err) {
            console.warn('Scroll error:', err);
          }
        });
      })();
    </script>
  </body>
</html>
